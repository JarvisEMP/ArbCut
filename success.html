<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ačiū — ArbCut</title>
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,700&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />

  <style>
    /* Page-specific overrides */
    .success-page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
    }

    .success-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-10) var(--gutter);
      background-color: var(--color-bg-cream);
    }

    .success-card {
      text-align: center;
      max-width: 520px;
    }

    .success-card__icon {
      width: 72px;
      height: 72px;
      background-color: var(--color-forest);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-6);
      color: #fff;
    }

    .success-card__title {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      color: var(--color-forest);
      margin-bottom: var(--space-4);
    }

    .success-card__body {
      color: var(--color-text-muted);
      font-size: 1.05rem;
      line-height: 1.65;
      margin-bottom: var(--space-7);
    }

    .success-card__phone {
      display: block;
      margin-top: var(--space-3);
      font-weight: 600;
      color: var(--color-rust);
      font-size: 1.1rem;
    }
  </style>
</head>
<body class="success-page">

  <!-- Minimal header — no nav needed -->
  <header class="site-header is-scrolled" role="banner">
    <div class="site-header__inner container">
      <a href="index.html" class="site-header__logo" aria-label="ArbCut — grįžti į pagrindinį puslapį">
        <img src="assets/logo.svg" alt="ArbCut" class="site-header__logo-img" width="130" height="40" />
      </a>
      <a href="tel:+37060366901" class="btn btn--call site-header__cta" style="margin-left: auto;">
        <svg class="btn__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 3.07 9.81 19.79 19.79 0 0 1 2 1.18 2 2 0 0 1 4 0h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 7.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        Skambinti
      </a>
    </div>
  </header>

  <main class="success-main">
    <div class="success-card">

      <div class="success-card__icon" aria-hidden="true">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>

      <h1 class="success-card__title">Ačiū už užklausą!</h1>

      <div class="success-card__body">
        <p>Susisieksime artimiausiu metu.</p>
        <p>Jei reikia skubios pagalbos, skambinkite tiesiogiai:</p>
        <a href="tel:+37060366901" class="success-card__phone">+370 603 66901</a>
      </div>

      <a href="index.html" class="btn btn--forest btn--large">
        ← Grįžti į pagrindinį puslapį
      </a>

    </div>
  </main>

  <!-- Minimal footer -->
  <footer class="site-footer" role="contentinfo" style="padding-top: var(--space-8);">
    <div class="site-footer__inner container">
      <div class="site-footer__bottom" style="border-top: 1px solid rgba(255,255,255,0.08); padding-top: var(--space-5);">
        <p>© 2026 ArbCut. Visos teisės saugomos.</p>
      </div>
    </div>
  </footer>

</body>
</html>
